name: Update PLL Current Rosters

on:
  workflow_dispatch:
  schedule:
    # Daily during the PLL season; adjust as needed.
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  update-current-rosters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # The scraper now parses the site's server-rendered RSC JSON over plain
        # HTTP (urllib) — no browser needed, so Playwright/Chromium is gone.
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Scrape and cache current PLL rosters
        run: python pll_current_roster_cache.py

      - name: Commit updated roster cache
        # always() so that even when the scrape hard-fails, the diagnostics CSV
        # (which records which team/URL failed) is still committed for triage.
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update PLL current roster cache"
          file_pattern: data/reference_tables/current_rosters.csv data/reference_tables/current_rosters_diagnostics.csv
