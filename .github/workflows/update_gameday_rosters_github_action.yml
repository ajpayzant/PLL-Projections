name: Update PLL Gameday Rosters

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scrape mode"
        required: true
        default: "current"
        type: choice
        options:
          - current      # auto-detect current week only (default for scheduled runs)
          - all          # backfill all weeks with available data (weeks 1 through current)
  schedule:
    # Thu/Fri/Sat at 9am, Noon, and 5pm ET (UTC-4 in summer).
    # Runs regardless of whether rosters are posted yet — scraper returns
    # empty gracefully if the week isn't available, and overwrites with
    # the full roster once it is posted.
    - cron: "0 13 * * 4"   # Thursday  9am ET
    - cron: "0 16 * * 4"   # Thursday 12pm ET
    - cron: "0 21 * * 4"   # Thursday  5pm ET
    - cron: "0 13 * * 5"   # Friday    9am ET
    - cron: "0 16 * * 5"   # Friday   12pm ET
    - cron: "0 21 * * 5"   # Friday    5pm ET
    - cron: "0 13 * * 6"   # Saturday  9am ET
    - cron: "0 16 * * 6"   # Saturday 12pm ET
    - cron: "0 21 * * 6"   # Saturday  5pm ET

permissions:
  contents: write

jobs:
  update-gameday-rosters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow

      - name: Scrape gameday rosters
        env:
          PLL_BEARER_TOKEN: ${{ secrets.PLL_BEARER_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'current' }}"
          if [ "$MODE" = "all" ]; then
            echo "Scraping all available weeks..."
            python pll_gameday_roster_cache.py --all-weeks
          else
            echo "Scraping current week..."
            python pll_gameday_roster_cache.py
          fi

      - name: Pull latest before committing (avoid non-fast-forward conflicts)
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true

      - name: Commit updated gameday roster cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update PLL gameday rosters [skip ci]"
          push_options: "--force-with-lease"
          file_pattern: data/reference_tables/gameday_rosters/*.csv
